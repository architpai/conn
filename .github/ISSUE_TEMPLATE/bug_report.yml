name: Bug report
description: Report a reproducible problem in Conn
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Conn. Do not include secrets, private transcripts, or personal data. Report security vulnerabilities privately through https://github.com/architpai/conn/security/advisories/new.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: input
    id: conn-version
    attributes:
      label: Conn version
      placeholder: 0.1.1
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS and Mac model
      placeholder: macOS 15.x, MacBook Pro with Apple silicon
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex CLI and App Server versions
      description: Include both if Conn shows them in diagnostics.
      placeholder: codex-cli x.y.z; App Server x.y.z
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Integration mode
      options:
        - Managed Daemon Mode
        - Shared Desktop Mode (experimental)
        - Setup or integration unavailable
        - Unsure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch Conn...
        2. Start a Codex thread...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs or screenshots
      description: Remove credentials, prompts, transcripts, usernames, and personal paths before attaching evidence.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
