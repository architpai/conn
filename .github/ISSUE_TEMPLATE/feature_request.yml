name: Feature request
description: Propose an improvement to Conn
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem before prescribing an implementation. Conn must preserve Codex ownership, honest capability boundaries, and local privacy.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for this request.
          required: true
        - label: This request does not depend on silently controlling unrelated Codex work or private Desktop IPC.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today, and who experiences it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the user-visible result. Implementation ideas are welcome but optional.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: safety
    attributes:
      label: Privacy, security, and compatibility considerations
      description: Note any new data retention, permissions, Codex controls, experimental APIs, or platform requirements.
  - type: textarea
    id: context
    attributes:
      label: Additional context or mockups
