name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build Conn
        run: swift build
      - name: App Server adapter tests
        run: swift run conn-app-server-adapter-tests
      - name: Domain tests
        run: swift run conn-domain-tests
      - name: App core tests
        run: swift run conn-app-core-tests
      - name: Release inspector tests
        run: ./scripts/test-inspect-release.sh

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm web:build
      - run: pnpm web:lint
