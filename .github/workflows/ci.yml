name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.website.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect website changes
        id: website
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- \
            apps/web \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build Conn
        run: swift build
      - name: App Server adapter tests
        run: '"$(swift build --show-bin-path)/conn-app-server-adapter-tests"'
      - name: Domain tests
        run: '"$(swift build --show-bin-path)/conn-domain-tests"'
      # The app-core suite exercises macOS session and workspace behavior that
      # requires an interactive login session. Run it as part of the local
      # release gate documented in docs/releasing.md; hosted runners are
      # intentionally limited to the portable suites below.
      - name: Release inspector tests
        run: ./scripts/test-inspect-release.sh

  website:
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm web:build
      - run: pnpm web:lint
